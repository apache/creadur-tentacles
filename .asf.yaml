github:
  description: "Apache Creadur Tentacles"
  homepage: https://creadur.apache.org/tentacles
  labels:
    - maven
    - java
    - cli
    - licensechecker
    - apache
    - creadur
    - tentacles
  autolink_jira:
    - RAT
    - WHISKER
    - TENTACLES
  del_branch_on_merge: true

  rulesets:
    - name: "Default Branch Protection"
      type: branch
      branches:
        includes:
          - "~DEFAULT_BRANCH"
          - "release/*"
          - "rel/*"
        excludes: []
      bypass_teams:
        - root
      restrict_deletion: true
      restrict_force_push: true
notifications:
  commits: commits@creadur.apache.org
